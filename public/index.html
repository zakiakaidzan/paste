    <!-- Javascript Logic Wrapper -->
    <script>
        // ==========================================
        // KONFIGURASI GLOBAL & UTILITY
        // ==========================================
        const API_BASE_URL = "https://paste.warungmezur.workers.dev";
        const FRONTEND_URL = "https://paste.warungmezur.web.id";
        
        const appDiv = document.getElementById("app");
        const toastRoot = document.getElementById("toast-root");
        const modalRoot = document.getElementById("modal-root");

        // Temporary storage for unlocked private paste from Archive
        window.__unlockedPaste = null;

        // Utility: Escape HTML untuk mencegah XSS di innerHTML
        function escapeHtml(text) {
            if (!text) return "";
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Utility: Format Tanggal Indonesia
        function formatDate(timestamp) {
            if (!timestamp) return "-";
            const date = new Date(timestamp);
            const options = {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                timeZone: 'Asia/Jakarta'
            };
            let formatted = new Intl.DateTimeFormat('id-ID', options).format(date);
            return formatted.replace(' pukul ', ', ');
        }

        // Utility: Copy to Clipboard
        function copyText(text) {
            if (navigator.clipboard && window.isSecureContext) {
                return navigator.clipboard.writeText(text);
            } else {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                return new Promise((res, rej) => {
                    document.execCommand('copy') ? res() : rej();
                    textArea.remove();
                });
            }
        }

        // Utility: Show Toast
        function showToast(message, type = "success") {
            const toast = document.createElement('div');
            
            let bgClass = "bg-panel border-line text-white";
            let icon = "";
            
            if (type === "success") {
                bgClass = "bg-panel border-neon text-white";
                icon = `<svg class="w-5 h-5 text-neon shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
            } else if (type === "error") {
                bgClass = "bg-panel border-red-500 text-white";
                icon = `<svg class="w-5 h-5 text-red-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>`;
            } else {
                icon = `<svg class="w-5 h-5 text-muted shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            }

            toast.className = `flex items-center gap-3 w-full p-4 rounded-lg shadow-xl border ${bgClass} pointer-events-auto transition-all duration-300 transform translate-y-4 opacity-0`;
            toast.innerHTML = `
                ${icon}
                <span class="text-sm font-medium flex-1">${escapeHtml(message)}</span>
            `;

            toastRoot.appendChild(toast);

            requestAnimationFrame(() => {
                toast.classList.remove('translate-y-4', 'opacity-0');
            });

            setTimeout(() => {
                toast.classList.add('opacity-0', 'scale-95');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Utility: Loading State
        function setLoading(element, isLoading, originalText = '', loadingText = 'Saving...') {
            if (isLoading) {
                element.disabled = true;
                element.innerHTML = `
                    <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-dark inline-block" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    ${loadingText}
                `;
                element.classList.add('opacity-70', 'cursor-not-allowed');
            } else {
                element.disabled = false;
                element.innerHTML = originalText;
                element.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        }

        // ==========================================
        // FITUR PASSWORD & UNLOCK
        // ==========================================
        function togglePasswordVisibility(inputId, buttonId) {
            const input = document.getElementById(inputId);
            const btn = document.getElementById(buttonId);
            if (!input || !btn) return;

            const iconEye = btn.querySelector('.eye-icon');
            const iconEyeSlash = btn.querySelector('.eye-slash-icon');

            if (input.type === 'password') {
                input.type = 'text';
                iconEye?.classList.add('hidden');
                iconEyeSlash?.classList.remove('hidden');
            } else {
                input.type = 'password';
                iconEye?.classList.remove('hidden');
                iconEyeSlash?.classList.add('hidden');
            }
        }

        function togglePrivatePasswordField() {
            const visibilityEl = document.getElementById('paste-visibility');
            const passwordContainer = document.getElementById('password-container');
            const passwordInput = document.getElementById('paste-password');

            if (!visibilityEl || !passwordContainer || !passwordInput) return;

            if (visibilityEl.value === 'private') {
                passwordContainer.classList.remove('hidden');
                passwordContainer.classList.add('block');
                setTimeout(() => passwordInput.focus(), 100);
            } else {
                passwordContainer.classList.add('hidden');
                passwordContainer.classList.remove('block');
                passwordInput.value = ''; 
                
                passwordInput.type = 'password';
                const toggleBtn = document.getElementById('btn-toggle-password');
                const iconEye = toggleBtn?.querySelector('.eye-icon');
                const iconEyeSlash = toggleBtn?.querySelector('.eye-slash-icon');
                iconEye?.classList.remove('hidden');
                iconEyeSlash?.classList.add('hidden');
            }
        }

        function renderPrivateUnlock(pasteMeta, slug) {

                    </div>

                    <p class="text-muted text-sm mb-8">Masukkan password untuk membuka paste ini.</p>
                    
                    <div class="w-full max-w-sm mb-8 space-y-4">
                        <div class="relative">
                            <input type="password" id="unlock-password" placeholder="Password paste..." class="w-full bg-panel border border-line focus:border-neon focus:ring-1 focus:ring-neon rounded-lg px-4 py-3.5 text-sm text-white outline-none transition-all pr-12">
                            <button type="button" id="btn-toggle-unlock" class="absolute inset-y-0 right-0 flex items-center px-4 text-muted hover:text-white transition-colors" onclick="togglePasswordVisibility('unlock-password', 'btn-toggle-unlock')">
                                <svg class="w-5 h-5 eye-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                                <svg class="w-5 h-5 eye-slash-icon hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path></svg>
                            </button>
                        </div>
                        <button id="btn-unlock" class="w-full bg-neon hover:bg-neon/90 text-dark font-bold py-3.5 px-4 rounded-lg transition-colors text-sm shadow-[0_0_15px_rgba(24,224,111,0.2)]">
                            Unlock
                        </button>
                    </div>

                    <div class="flex flex-col sm:flex-row gap-4">
                        <button onclick="navigateTo('/')" class="bg-panel hover:bg-line border border-line text-white font-medium py-2.5 px-6 rounded-lg text-sm transition-colors">Back to New Paste</button>
                        <button onclick="navigateTo('/archive')" class="bg-panel hover:bg-line border border-line text-white font-medium py-2.5 px-6 rounded-lg text-sm transition-colors">Back to Archive</button>
                    </div>
                </div>
            `;

            const pwInput = document.getElementById('unlock-password');
            const btnUnlock = document.getElementById('btn-unlock');
            
            const handleUnlock = () => verifyPrivatePaste(slug);

            btnUnlock.addEventListener('click', handleUnlock);
            pwInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleUnlock();
                }
            });

            pwInput.focus();
        }

        async function verifyPrivatePaste(slug) {
            const pwInput = document.getElementById('unlock-password');
            const btnUnlock = document.getElementById('btn-unlock');
            const password = pwInput.value.trim();

            if (!password) {
                showToast("Password wajib diisi", "error");
                pwInput.focus();
                return;
            }

            const originalText = btnUnlock.innerHTML;
            setLoading(btnUnlock, true, originalText, 'Unlocking...');

            try {
                const res = await fetch(`${API_BASE_URL}/api/pastes/${slug}/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                
                const result = await res.json();

                if (result.success) {
                    showToast("Password benar", "success");
                    renderPasteContent(result.data, slug);
                } else {
                    showToast(result.message || "Password salah", "error");
                    pwInput.value = "";
                    pwInput.focus();
                }
            } catch (error) {
                showToast("Terjadi kesalahan sistem", "error");
            } finally {
                setLoading(btnUnlock, false, originalText);
            }
        }

        // ==========================================
        // ARCHIVE PRIVATE UNLOCK MODAL
        // ==========================================
        function openArchivePrivateUnlockModal(slug) {
             const paste = archiveDataCache.find(p => p.slug === slug);
             if(!paste) return;

             modal.className = "fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm opacity-0 transition-opacity duration-300";
             modal.innerHTML = `

                         </div>
                         <h3 class="text-xl font-bold text-white mb-1">Paste Private</h3>

                         <div class="w-full relative mb-6">
                             <input type="password" id="archive-unlock-password" placeholder="Password paste..." class="w-full bg-panel2 border border-line focus:border-neon focus:ring-1 focus:ring-neon rounded-lg px-4 py-3 text-sm text-white outline-none transition-all pr-12">
                             <button type="button" id="btn-toggle-archive-unlock" class="absolute inset-y-0 right-0 flex items-center px-4 text-muted hover:text-white transition-colors" onclick="togglePasswordVisibility('archive-unlock-password', 'btn-toggle-archive-unlock')">
                                 <svg class="w-5 h-5 eye-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                                 <svg class="w-5 h-5 eye-slash-icon hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path></svg>
                             </button>
                         </div>
                         
                         <div class="w-full flex flex-col md:flex-row gap-3">
                             <button id="modal-cancel-btn" class="flex-1 bg-line hover:bg-softline text-white py-2.5 px-4 rounded-lg font-medium transition-colors text-sm">
                                 Cancel
                             </button>
                             <button id="modal-unlock-btn" class="flex-1 bg-neon hover:bg-neon/90 text-dark py-2.5 px-4 rounded-lg font-bold transition-colors text-sm shadow-[0_0_15px_rgba(24,224,111,0.3)]">
                                 Unlock
                             </button>
                         </div>
                     </div>
                 </div>
             `;

             modalRoot.appendChild(modal);
             
             const pwInput = modal.querySelector('#archive-unlock-password');
             const btnUnlock = modal.querySelector('#modal-unlock-btn');
             const btnCancel = modal.querySelector('#modal-cancel-btn');

             const closeHandler = () => {
                 modal.classList.add('opacity-0');
                 modal.querySelector('#modal-content').classList.add('scale-95');
                 setTimeout(() => modal.remove(), 300);
             };

             btnCancel.addEventListener('click', closeHandler);
             
             modal.addEventListener('click', (e) => {
                 if (e.target === modal) closeHandler(); 
             });

             const handleUnlock = () => verifyArchivePrivatePaste(slug, pwInput, btnUnlock, closeHandler);

             btnUnlock.addEventListener('click', handleUnlock);
             pwInput.addEventListener('keydown', (e) => {
                 if(e.key === 'Enter') {
                     e.preventDefault();
                     handleUnlock();
                 }
             });

             requestAnimationFrame(() => {
                 modal.classList.remove('opacity-0');
                 modal.querySelector('#modal-content').classList.remove('scale-95');
                 pwInput.focus();
             });
        }

        async function verifyArchivePrivatePaste(slug, pwInput, btnUnlock, closeHandler) {
             const password = pwInput.value.trim();

             if (!password) {
                 showToast("Password wajib diisi", "error");
                 pwInput.focus();
                 return;
             }

             const originalText = btnUnlock.innerHTML;
             setLoading(btnUnlock, true, originalText, 'Unlocking...');

             try {
                 const res = await fetch(`${API_BASE_URL}/api/pastes/${slug}/verify`, {
                     method: 'POST',
                     headers: { 'Content-Type': 'application/json' },
                     body: JSON.stringify({ password })
                 });
                 
                 const result = await res.json();

                 if (result.success) {
                     closeHandler();
                     window.__unlockedPaste = result.data;
                     navigateTo("/p/" + slug);
                 } else {
                     showToast(result.message || "Password salah", "error");
                     pwInput.value = "";
                     pwInput.focus();
                 }
             } catch (error) {
                 showToast("Terjadi kesalahan sistem", "error");
             } finally {
                 setLoading(btnUnlock, false, originalText);
             }
        }

        // ==========================================
        // UI COMPONENTS & MODALS
        // ==========================================
        function showSuccessModal(data, isPrivate = false) {
            const modal = document.createElement('div');
            const slug = data.slug;
            // Clean URL
            const pasteUrl = data.frontend_url || data.full_url || (FRONTEND_URL + "/p/" + slug);
            
            const privateNotice = isPrivate ? 
                `<p class="text-xs text-yellow-500 mt-3 font-medium bg-yellow-500/10 py-2 px-3 rounded border border-yellow-500/20">Paste ini private. Simpan password kamu, karena dibutuhkan untuk membuka paste.</p>` : '';

            modal.className = "fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm opacity-0 transition-opacity duration-300";
            modal.innerHTML = `
                <div class="bg-panel border border-line rounded-xl shadow-2xl w-full max-w-[92vw] md:max-w-md transform scale-95 transition-transform duration-300" id="modal-content">
                    <div class="p-6 md:p-8 text-center flex flex-col items-center">
                        <div class="w-16 h-16 bg-neon/10 rounded-full flex items-center justify-center mb-5 border border-neon/20">
                            <svg class="w-8 h-8 text-neon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                            </svg>
                        </div>
                        <h3 class="text-xl font-bold text-white mb-2">Paste berhasil dibuat</h3>
                        <p class="text-muted text-sm mb-6">Link paste kamu sudah siap.</p>
                        
                        <div class="w-full flex bg-panel2 border border-line rounded-lg overflow-hidden mb-3 relative">
                            <input type="text" readonly value="${pasteUrl}" class="w-full bg-transparent text-sm text-muted px-4 py-3 outline-none min-w-0" id="modal-link-input">
                        </div>
                        
                        ${privateNotice}
                        
                        <div class="w-full flex flex-col md:flex-row gap-3 mt-6">
                            <button id="modal-copy-btn" class="flex-1 bg-line hover:bg-softline text-white py-2.5 px-4 rounded-lg font-medium transition-colors text-sm">
                                Copy Link
                            </button>
                            <button id="modal-open-btn" class="flex-1 bg-neon hover:bg-neon/90 text-dark py-2.5 px-4 rounded-lg font-bold transition-colors text-sm shadow-[0_0_15px_rgba(24,224,111,0.3)]">
                                Open Paste
                            </button>
                        </div>
                    </div>
                    <!-- Close Button -->
                    <button id="modal-close-btn" class="absolute top-4 right-4 text-muted hover:text-white transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
            `;

            modalRoot.appendChild(modal);

            // Modal Events
            modal.querySelector('#modal-copy-btn').addEventListener('click', () => {
                copyText(pasteUrl).then(() => showToast("Link berhasil disalin"));
            });
            
            modal.querySelector('#modal-open-btn').addEventListener('click', () => {
                closeModal();
                
                // If it's private, we just created it and have the raw string? 
                // Wait, if we just created it, the backend doesn't send the raw content back in the success response.
                // We will navigate to /p/slug. The detail page will try to fetch it, 
                // get 401 (private), and show the unlock screen. This is secure and expected.
                navigateTo("/p/" + slug);
            });

            const closeHandler = () => closeModal();
            modal.querySelector('#modal-close-btn').addEventListener('click', closeHandler);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeHandler(); 
            });

            const escHandler = (e) => {
                if (e.key === "Escape") {
                    closeHandler();
                    document.removeEventListener('keydown', escHandler);
                }
            };
            document.addEventListener('keydown', escHandler);

            requestAnimationFrame(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('#modal-content').classList.remove('scale-95');
            });
        }

        function closeModal() {
            const modal = modalRoot.firstElementChild;
            if (modal) {
                modal.classList.add('opacity-0');
                modal.querySelector('#modal-content').classList.add('scale-95');
                setTimeout(() => modal.remove(), 300);
            }
        }

            history.pushState(null, "", path);

            const path = window.location.pathname;
            window.scrollTo(0, 0); 

            if (path === "/") {
                renderNewPaste();
            } else if (path === "/archive") {
                renderArchive();
            } else if (path.startsWith("/p/")) {
                const slug = path.replace("/p/", "");
                if(slug) {
                    renderPasteDetail(slug);
                } else {
                    renderNotFound();
                }
            } else {
                renderNotFound();
            }

        async function createPaste(originalBtnText) {
            const titleEl = document.getElementById('paste-title');
            const syntaxEl = document.getElementById('paste-syntax');
            const visibilityEl = document.getElementById('paste-visibility');
            const expirationEl = document.getElementById('paste-expiration');
            const contentEl = document.getElementById('paste-content');
            const passwordEl = document.getElementById('paste-password');
            const submitBtn = document.getElementById('btn-submit');

            const content = contentEl.value.trim();
            const visibility = visibilityEl.value;
            const password = passwordEl.value.trim();

            if (!content) {
                showToast("Paste text tidak boleh kosong", "error");
                contentEl.focus();
                return;
            }

            if (visibility === 'private' && !password) {
                showToast("Password wajib diisi untuk paste private", "error");
                passwordEl.focus();
                return;
            }

            const payload = {
                title: titleEl.value.trim() || "Untitled Paste",
                content: content,
                syntax: syntaxEl.value,
                visibility: visibility,
                expiration: expirationEl.value
            };

            if (visibility === 'private') {
                payload.password = password;
            }

            setLoading(submitBtn, true, originalBtnText);

            try {
                const res = await fetch(`${API_BASE_URL}/api/pastes`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await res.json();

                if (res.ok && result.success) {
                    contentEl.value = "";
                    document.getElementById('char-count').textContent = "0 chars";
                    // Pass isPrivate to show the extra notice
                    showSuccessModal(result.data, visibility === 'private');
                } else {
                    throw new Error(result.message || "Gagal membuat paste");
                }
            } catch (error) {
                showToast(error.message, "error");
            } finally {
                setLoading(submitBtn, false, originalBtnText);
            }
        }

        async function fetchArchive(page) {
            const listEl = document.getElementById('archive-list');
            const paginationEl = document.getElementById('archive-pagination');
            const searchInput = document.getElementById('archive-search');
            
            try {
                const res = await fetch(`${API_BASE_URL}/api/pastes?page=${page}&limit=50`);
                const result = await res.json();

                if (res.ok && result.success) {
                    const data = result.data;
                    const pagination = result.pagination;
                    archiveDataCache = data; 
                    
                    renderArchiveList(data);

                    searchInput.addEventListener('input', (e) => {
                        const query = e.target.value.toLowerCase();
                        const filtered = archiveDataCache.filter(item => 
                            (item.title || "Untitled Paste").toLowerCase().includes(query)
                        );
                        renderArchiveList(filtered, query !== "");
                    });

                    // Pagination Control
                    if (pagination && pagination.total_pages > 1) {
                        paginationEl.classList.remove('hidden');
                        
                        const btnPrev = document.getElementById('btn-prev');
                        const btnNext = document.getElementById('btn-next');
                        const pageInfo = document.getElementById('page-info');

                        pageInfo.textContent = `Page ${pagination.page} of ${pagination.total_pages}`;
                        
                        btnPrev.disabled = pagination.page <= 1;
                        btnNext.disabled = pagination.page >= pagination.total_pages;

                        const newBtnPrev = btnPrev.cloneNode(true);
                        const newBtnNext = btnNext.cloneNode(true);
                        btnPrev.replaceWith(newBtnPrev);
                        btnNext.replaceWith(newBtnNext);

                        newBtnPrev.addEventListener('click', () => { window.scrollTo(0,0); renderArchive(pagination.page - 1); });
                        newBtnNext.addEventListener('click', () => { window.scrollTo(0,0); renderArchive(pagination.page + 1); });
                    } else {
                        paginationEl.classList.add('hidden');
                    }
                } else {
                    throw new Error(result.message || "Gagal mengambil data");
                }
            } catch (error) {
                listEl.innerHTML = `
                    <div class="bg-panel border border-red-500/30 rounded-xl p-8 text-center">
                        <p class="text-sm text-muted">${error.message}</p>
                        <button onclick="renderArchive(1)" class="mt-4 bg-line hover:bg-softline text-white font-medium py-2 px-6 rounded-lg text-sm">Coba Lagi</button>
                    </div>
                `;
            }
        }

                                </span>
                                <span class="flex items-center gap-1" title="Created At">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    ${formatDate(paste.created_at)}
                                </span>
                            </div>
                        </div>
                        ${buttonHtml}
                    </div>
                `;
            }).join('');
        }

        // ==========================================
        // HALAMAN: PASTE DETAIL & UNLOCK
        // ==========================================
        async function renderPasteDetail(slug) {
            const html = `
                <main class="max-w-screen-xl mx-auto w-full p-4 md:p-6 lg:p-10 min-h-[calc(100vh-73px)] flex flex-col gap-6">
                    <div id="detail-header" class="flex flex-col md:flex-row md:items-start justify-between gap-4 animate-pulse">
                        <div class="space-y-3 flex-1">
                            <div class="h-8 bg-panel border border-line rounded w-3/4 md:w-1/2"></div>
                            <div class="h-5 bg-panel border border-line rounded w-full md:w-1/3"></div>
                        </div>
                    </div>
                    
                    <div id="detail-content" class="bg-panel border border-line rounded-xl overflow-hidden flex-1 animate-pulse min-h-[400px]">
                    </div>
                </main>
            `;
            
            renderLayout(html);

            // Cek apakah paste ini baru saja di-unlock dari halaman archive
            if (window.__unlockedPaste && window.__unlockedPaste.slug === slug) {
                const paste = window.__unlockedPaste;
                window.__unlockedPaste = null; // Clear setetlah digunakan
                renderPasteContent(paste, slug);
                return;
            }

            await fetchPaste(slug);
        }

        async function fetchPaste(slug) {
            try {
                const res = await fetch(`${API_BASE_URL}/api/pastes/${slug}`);
                const result = await res.json();

                if (result.success) {
                    renderPasteContent(result.data, slug);
                } else if (!result.success && result.private) {
                    renderPrivateUnlock(result.data, slug);
                } else {
                    throw new Error(result.message || "Paste tidak ditemukan");
                }
            } catch (error) {
                const mainEl = document.querySelector('main');
                mainEl.innerHTML = `
                    <div class="flex-1 flex flex-col items-center justify-center text-center p-8 mt-10">
                        <h1 class="text-2xl font-bold text-white mb-2">Paste Tidak Ditemukan</h1>
                        <p class="text-muted mb-8">${error.message}</p>
                        <div class="flex flex-col sm:flex-row gap-4">
                            <button onclick="navigateTo('/')" class="bg-neon hover:bg-neon/90 text-dark font-bold py-2.5 px-6 rounded-lg text-sm">Buat Paste Baru</button>
                            <button onclick="navigateTo('/archive')" class="bg-panel hover:bg-line border border-line text-white font-medium py-2.5 px-6 rounded-lg text-sm">Lihat Archive</button>
                        </div>
                    </div>
                `;
            }
        }

        function renderPasteContent(paste, slug) {
            const mainEl = document.querySelector('main');
            const syntax = paste.syntax || 'text';
            const highlightClass = syntax === 'text' ? 'language-plaintext' : `language-${syntax}`;
            
            const rawUrl = paste.raw_url || `${API_BASE_URL}/api/raw/${slug}`;
            
            mainEl.innerHTML = `
                <div class="flex flex-col md:flex-row md:items-start justify-between gap-6 mb-2">
                    <div class="flex-1 min-w-0">
                        <h1 class="text-2xl md:text-3xl font-bold text-white tracking-tight mb-3 break-words leading-tight">
                            ${escapeHtml(paste.title || 'Untitled Paste')}
                        </h1>
                        
                        <div class="flex flex-wrap items-center gap-4 text-sm text-muted">
                            <span class="inline-flex items-center gap-1.5 bg-panel border border-line px-2.5 py-1.5 rounded-md text-white/90">
                                <span class="capitalize font-medium">${syntax}</span>
                            </span>
                            <span class="flex items-center gap-1.5">
                                ${paste.views || 0} Views
                            </span>
                            <span class="flex items-center gap-1.5">
                                ${formatDate(paste.created_at)}
                            </span>
                            <span class="flex items-center gap-1.5 capitalize">
                                ${paste.visibility}
                            </span>
                        </div>
                    </div>
                    
                    <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto shrink-0">
                        <button id="btn-copy-raw" class="bg-panel hover:bg-line border border-line text-white font-medium py-2.5 px-4 rounded-lg transition-colors text-sm">
                            Copy Raw
                        </button>
                        <button onclick="window.open('${rawUrl}', '_blank')" class="bg-panel hover:bg-line border border-line text-white font-medium py-2.5 px-4 rounded-lg transition-colors text-sm">
                            Open Raw
                        </button>
                        <button onclick="navigateTo('/')" class="bg-neon hover:bg-neon/90 text-dark font-bold py-2.5 px-4 rounded-lg transition-colors text-sm text-center">
                            New Paste
                        </button>
                    </div>
                </div>

                <!-- Code Area -->
                <div class="bg-[#0d1117] border border-line rounded-xl shadow-xl flex-1 flex flex-col min-w-0 mt-4 overflow-hidden">
                    <div class="flex items-center justify-between px-4 py-2.5 border-b border-line/50 bg-[#161b22]">
                        <div class="flex gap-1.5">
                            <div class="w-3 h-3 rounded-full bg-line"></div>
                            <div class="w-3 h-3 rounded-full bg-line"></div>
                            <div class="w-3 h-3 rounded-full bg-line"></div>
                        </div>
                    </div>
                    <div class="relative flex-1 overflow-x-auto">
                        <pre class="m-0 p-4 md:p-6 text-[13px] md:text-sm leading-relaxed"><code id="code-block" class="!bg-transparent ${highlightClass}"></code></pre>
                    </div>
                </div>
                
                <div class="mt-2 text-center flex flex-col sm:flex-row items-center justify-center gap-4">
                     <button onclick="navigateTo('/archive')" class="inline-flex items-center gap-2 text-sm text-muted hover:text-white transition-colors">
                        Back to Archive
                     </button>
                     <button onclick="navigateTo('/')" class="inline-flex items-center gap-2 text-sm text-muted hover:text-white transition-colors sm:hidden">
                        Back to New Paste
                     </button>
                </div>
            `;

            // MENCEGAH XSS: Masukkan content dengan .textContent bukan .innerHTML!
            const codeBlock = document.getElementById('code-block');
            codeBlock.textContent = paste.content || "";

            // Terapkan Highlight.js
            if (typeof hljs !== 'undefined') {
                try {
                    if (syntax !== 'text' && syntax !== 'plaintext') {
                       hljs.highlightElement(codeBlock);
                    }
                } catch (e) {
                    console.error("Highlight.js error:", e);
                }
            }

            document.getElementById('btn-copy-raw').addEventListener('click', () => {
                copyText(paste.content || "").then(() => showToast("Raw text disalin ke clipboard"));
            });
        }

        // ==========================================
        // INISIALISASI APLIKASI
        // ==========================================
        initApp();
    </script>
</body>
</html>
