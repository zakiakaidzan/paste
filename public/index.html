<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasteview - Code Snippet & Text Storage</title>
    
    <!-- Google Font Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Highlight.js CSS for Syntax Highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: "#111111",
                        panel: "#202020",
                        panel2: "#181818",
                        line: "#333333",
                        softline: "#444444",
                        neon: "#18e06f",
                        muted: "#a3a3a3"
                    },
                    fontFamily: {
                        inter: ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
    
    <!-- Highlight.js Script -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body class="min-h-screen bg-dark text-white font-inter overflow-x-hidden selection:bg-neon selection:text-dark">
    
    <!-- Main App Container -->
    <div id="app" class="flex flex-col min-h-screen"></div>

    <!-- Toast Notifications Root -->
    <div id="toast-root" class="fixed bottom-4 left-1/2 -translate-x-1/2 md:left-auto md:right-4 md:translate-x-0 z-50 flex flex-col gap-2 w-[90vw] md:w-auto max-w-sm pointer-events-none"></div>

    <!-- Modal Root -->
    <div id="modal-root" class="relative z-50"></div>

    <!-- Javascript Logic Wrapper -->
    <script>
        // ==========================================
        // KONFIGURASI GLOBAL & UTILITY
        // ==========================================
        const API_BASE_URL = "https://paste.warungmezur.workers.dev";
        const FRONTEND_URL = "https://paste.warungmezur.web.id";
        
        const appDiv = document.getElementById("app");
        const toastRoot = document.getElementById("toast-root");
        const modalRoot = document.getElementById("modal-root");

        // Utility: Escape HTML untuk mencegah XSS di innerHTML
        function escapeHtml(text) {
            if (!text) return "";
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Utility: Format Tanggal Indonesia
        function formatDate(timestamp) {
            if (!timestamp) return "-";
            const date = new Date(timestamp);
            const options = {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                timeZone: 'Asia/Jakarta'
            };
            let formatted = new Intl.DateTimeFormat('id-ID', options).format(date);
            return formatted.replace(' pukul ', ', ');
        }

        // Utility: Copy to Clipboard
        function copyText(text) {
            if (navigator.clipboard && window.isSecureContext) {
                return navigator.clipboard.writeText(text);
            } else {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                return new Promise((res, rej) => {
                    document.execCommand('copy') ? res() : rej();
                    textArea.remove();
                });
            }
        }

        // Utility: Show Toast
        function showToast(message, type = "success") {
            const toast = document.createElement('div');
            
            let bgClass = "bg-panel border-line text-white";
            let icon = "";
            
            if (type === "success") {
                bgClass = "bg-panel border-neon text-white";
                icon = `<svg class="w-5 h-5 text-neon shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
            } else if (type === "error") {
                bgClass = "bg-panel border-red-500 text-white";
                icon = `<svg class="w-5 h-5 text-red-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>`;
            } else {
                icon = `<svg class="w-5 h-5 text-muted shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            }

            toast.className = `flex items-center gap-3 w-full p-4 rounded-lg shadow-xl border ${bgClass} pointer-events-auto transition-all duration-300 transform translate-y-4 opacity-0`;
            toast.innerHTML = `
                ${icon}
                <span class="text-sm font-medium flex-1">${escapeHtml(message)}</span>
            `;

            toastRoot.appendChild(toast);

            requestAnimationFrame(() => {
                toast.classList.remove('translate-y-4', 'opacity-0');
            });

            setTimeout(() => {
                toast.classList.add('opacity-0', 'scale-95');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Utility: Loading State
        function setLoading(element, isLoading, originalText = '') {
            if (isLoading) {
                element.disabled = true;
                element.innerHTML = `
                    <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-dark" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    Saving...
                `;
                element.classList.add('opacity-70', 'cursor-not-allowed');
            } else {
                element.disabled = false;
                element.innerHTML = originalText;
                element.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        }

        // ==========================================
        // UI COMPONENTS & MODALS
        // ==========================================
        function showSuccessModal(data) {
            const modal = document.createElement('div');
            const slug = data.slug;
            // Clean URL
            const pasteUrl = data.frontend_url || data.full_url || (FRONTEND_URL + "/p/" + slug);
            
            modal.className = "fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm opacity-0 transition-opacity duration-300";
            modal.innerHTML = `
                <div class="bg-panel border border-line rounded-xl shadow-2xl w-full max-w-[92vw] md:max-w-md transform scale-95 transition-transform duration-300" id="modal-content">
                    <div class="p-6 md:p-8 text-center flex flex-col items-center">
                        <div class="w-16 h-16 bg-neon/10 rounded-full flex items-center justify-center mb-5 border border-neon/20">
                            <svg class="w-8 h-8 text-neon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                            </svg>
                        </div>
                        <h3 class="text-xl font-bold text-white mb-2">Paste berhasil dibuat</h3>
                        <p class="text-muted text-sm mb-6">Link paste kamu sudah siap.</p>
                        
                        <div class="w-full flex bg-panel2 border border-line rounded-lg overflow-hidden mb-6 relative">
                            <input type="text" readonly value="${pasteUrl}" class="w-full bg-transparent text-sm text-muted px-4 py-3 outline-none min-w-0" id="modal-link-input">
                        </div>
                        
                        <div class="w-full flex flex-col md:flex-row gap-3">
                            <button id="modal-copy-btn" class="flex-1 bg-line hover:bg-softline text-white py-2.5 px-4 rounded-lg font-medium transition-colors text-sm">
                                Copy Link
                            </button>
                            <button id="modal-open-btn" class="flex-1 bg-neon hover:bg-neon/90 text-dark py-2.5 px-4 rounded-lg font-bold transition-colors text-sm shadow-[0_0_15px_rgba(24,224,111,0.3)]">
                                Open Paste
                            </button>
                        </div>
                    </div>
                    <!-- Close Button -->
                    <button id="modal-close-btn" class="absolute top-4 right-4 text-muted hover:text-white transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
            `;

            modalRoot.appendChild(modal);

            // Modal Events
            modal.querySelector('#modal-copy-btn').addEventListener('click', () => {
                copyText(pasteUrl).then(() => showToast("Link berhasil disalin"));
            });
            
            modal.querySelector('#modal-open-btn').addEventListener('click', () => {
                closeModal();
                navigateTo("/p/" + slug);
            });

            const closeHandler = () => closeModal();
            modal.querySelector('#modal-close-btn').addEventListener('click', closeHandler);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeHandler(); 
            });

            const escHandler = (e) => {
                if (e.key === "Escape") {
                    closeHandler();
                    document.removeEventListener('keydown', escHandler);
                }
            };
            document.addEventListener('keydown', escHandler);

            requestAnimationFrame(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('#modal-content').classList.remove('scale-95');
            });
        }

        function closeModal() {
            const modal = modalRoot.firstElementChild;
            if (modal) {
                modal.classList.add('opacity-0');
                modal.querySelector('#modal-content').classList.add('scale-95');
                setTimeout(() => modal.remove(), 300);
            }
        }

        function renderHeader() {
            const path = window.location.pathname;
            const isNew = path === "/";
            const isArchive = path === "/archive";

            return `
                <header class="sticky top-0 z-40 bg-dark/95 backdrop-blur-md border-b border-line px-4 md:px-6 lg:px-10 py-3 md:py-4">
                    <div class="max-w-screen-2xl mx-auto flex flex-wrap items-center justify-between gap-3">
                        <div class="flex items-center gap-6">
                            <a href="/" onclick="event.preventDefault(); navigateTo('/')" class="flex items-center gap-2 group outline-none">
                                <div class="w-8 h-8 bg-neon rounded flex items-center justify-center text-dark font-black text-xl group-hover:scale-105 transition-transform">
                                    P
                                </div>
                                <span class="text-lg font-bold text-white tracking-tight hidden sm:block">Pasteview</span>
                            </a>
                            
                            <nav class="hidden sm:flex items-center gap-1 bg-panel border border-line rounded-lg p-1">
                                <a href="/" onclick="event.preventDefault(); navigateTo('/')" class="px-3 py-1.5 rounded-md text-sm font-medium transition-colors ${isNew ? 'bg-line text-white' : 'text-muted hover:text-white'}">New Paste</a>
                                <a href="/archive" onclick="event.preventDefault(); navigateTo('/archive')" class="px-3 py-1.5 rounded-md text-sm font-medium transition-colors ${isArchive ? 'bg-line text-white' : 'text-muted hover:text-white'}">Paste Archive</a>
                            </nav>
                        </div>
                        
                        <div class="flex items-center gap-3">
                            <nav class="flex sm:hidden items-center gap-1 bg-panel border border-line rounded-lg p-1 mr-2">
                                 <a href="/" onclick="event.preventDefault(); navigateTo('/')" class="px-2.5 py-1.5 rounded-md text-xs font-medium transition-colors ${isNew ? 'bg-line text-white' : 'text-muted hover:text-white'}">New</a>
                                <a href="/archive" onclick="event.preventDefault(); navigateTo('/archive')" class="px-2.5 py-1.5 rounded-md text-xs font-medium transition-colors ${isArchive ? 'bg-line text-white' : 'text-muted hover:text-white'}">Archive</a>
                            </nav>
                            <span class="text-sm font-medium text-muted hidden md:block">Guest</span>
                            <button class="bg-panel hover:bg-line border border-line text-white text-sm font-medium py-1.5 px-4 rounded-lg transition-colors hidden sm:block">
                                Sign up or login
                            </button>
                        </div>
                    </div>
                </header>
            `;
        }

        // ==========================================
        // HISTORY API ROUTING
        // ==========================================
        function initApp() {
            window.addEventListener('popstate', renderRoute);
            renderRoute();
        }

        function navigateTo(path) {
            history.pushState(null, "", path);
            renderRoute();
        }

        function renderRoute() {
            const path = window.location.pathname;
            window.scrollTo(0, 0); 

            if (path === "/") {
                renderNewPaste();
            } else if (path === "/archive") {
                renderArchive();
            } else if (path.startsWith("/p/")) {
                const slug = path.replace("/p/", "");
                if(slug) {
                    renderPasteDetail(slug);
                } else {
                    renderNotFound();
                }
            } else {
                renderNotFound();
            }
        }

        function renderLayout(contentHTML) {
            appDiv.innerHTML = `
                ${renderHeader()}
                ${contentHTML}
            `;
        }

        function renderNotFound() {
            const html = `
                <main class="max-w-screen-xl mx-auto w-full p-4 md:p-6 lg:p-10 min-h-[calc(100vh-73px)] flex flex-col items-center justify-center text-center">
                    <h1 class="text-4xl font-bold text-white mb-2">404</h1>
                    <p class="text-muted mb-8">Halaman tidak ditemukan.</p>
                    <button onclick="navigateTo('/')" class="bg-neon hover:bg-neon/90 text-dark font-bold py-2.5 px-6 rounded-lg text-sm">Kembali ke Beranda</button>
                </main>
            `;
            renderLayout(html);
        }

        // ==========================================
        // HALAMAN: NEW PASTE
        // ==========================================
        function renderNewPaste() {
            const html = `
                <div class="max-w-screen-2xl mx-auto w-full grid grid-cols-1 lg:grid-cols-[330px_1fr] min-h-[calc(100vh-73px)]">
                    
                    <!-- Sidebar Form -->
                    <aside class="border-b lg:border-b-0 lg:border-r border-line p-4 md:p-6 lg:p-7 flex flex-col gap-6 order-2 lg:order-1 bg-dark">
                        
                        <!-- Placeholder Banner -->
                        <div class="w-full bg-panel border border-dashed border-softline rounded-lg p-4 flex flex-col items-center justify-center text-center opacity-70 mb-2">
                            <span class="text-[10px] font-bold text-muted uppercase tracking-widest mb-1">UPLOADERY</span>
                            <span class="text-xs text-muted/80">YOUR AD HERE</span>
                        </div>

                        <div class="flex flex-col gap-4">
                            <h2 class="text-lg font-bold text-white tracking-tight">Paste Settings</h2>
                            
                            <div class="space-y-4">
                                <div class="space-y-1.5">
                                    <label class="text-sm font-medium text-muted">Title</label>
                                    <input type="text" id="paste-title" placeholder="Untitled Paste" class="w-full bg-panel border border-line focus:border-neon focus:ring-1 focus:ring-neon rounded-lg px-4 py-2.5 text-sm text-white outline-none transition-all">
                                </div>

                                <div class="space-y-1.5">
                                    <label class="text-sm font-medium text-muted">Syntax Highlighting</label>
                                    <div class="relative">
                                        <select id="paste-syntax" class="w-full bg-panel border border-line focus:border-neon focus:ring-1 focus:ring-neon rounded-lg px-4 py-2.5 text-sm text-white outline-none appearance-none transition-all cursor-pointer">
                                            <option value="text">No Syntax (Text)</option>
                                            <option value="javascript">JavaScript</option>
                                            <option value="html">HTML</option>
                                            <option value="css">CSS</option>
                                            <option value="json">JSON</option>
                                            <option value="php">PHP</option>
                                            <option value="sql">SQL</option>
                                            <option value="java">Java</option>
                                            <option value="python">Python</option>
                                            <option value="markdown">Markdown</option>
                                            <option value="bash">Bash</option>
                                            <option value="typescript">TypeScript</option>
                                            <option value="xml">XML</option>
                                            <option value="cpp">C++</option>
                                            <option value="go">Go</option>
                                            <option value="rust">Rust</option>
                                            <option value="ruby">Ruby</option>
                                        </select>
                                        <div class="absolute inset-y-0 right-0 flex items-center px-3 pointer-events-none text-muted">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                        </div>
                                    </div>
                                </div>

                                <div class="space-y-1.5">
                                    <label class="text-sm font-medium text-muted">Visibility</label>
                                    <div class="relative">
                                        <select id="paste-visibility" class="w-full bg-panel border border-line focus:border-neon focus:ring-1 focus:ring-neon rounded-lg px-4 py-2.5 text-sm text-white outline-none appearance-none transition-all cursor-pointer">
                                            <option value="public">Public</option>
                                            <option value="unlisted">Unlisted</option>
                                            <option value="private">Private</option>
                                        </select>
                                        <div class="absolute inset-y-0 right-0 flex items-center px-3 pointer-events-none text-muted">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                        </div>
                                    </div>
                                </div>

                                <div class="space-y-1.5">
                                    <label class="text-sm font-medium text-muted">Expiration</label>
                                    <div class="relative">
                                        <select id="paste-expiration" class="w-full bg-panel border border-line focus:border-neon focus:ring-1 focus:ring-neon rounded-lg px-4 py-2.5 text-sm text-white outline-none appearance-none transition-all cursor-pointer">
                                            <option value="never">No Expiration</option>
                                            <option value="10m">10 Minutes</option>
                                            <option value="1h">1 Hour</option>
                                            <option value="1d">1 Day</option>
                                            <option value="7d">7 Days</option>
                                            <option value="30d">30 Days</option>
                                        </select>
                                        <div class="absolute inset-y-0 right-0 flex items-center px-3 pointer-events-none text-muted">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="flex flex-col gap-3 mt-4">
                                <button id="btn-save-template" class="w-full bg-panel hover:bg-line border border-line text-white font-medium py-3 px-4 rounded-lg transition-colors text-sm flex items-center justify-center gap-2">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                                    Save As Template
                                </button>
                                <button id="btn-submit" class="w-full bg-neon hover:bg-neon/90 text-dark font-bold py-3 px-4 rounded-lg transition-colors text-sm shadow-[0_0_15px_rgba(24,224,111,0.2)] flex items-center justify-center gap-2">
                                    Create Paste
                                </button>
                            </div>
                        </div>
                    </aside>

                    <!-- Main Editor Area -->
                    <main class="p-4 md:p-6 lg:p-10 min-w-0 order-1 lg:order-2 flex flex-col h-full">
                        <div class="bg-panel rounded-xl border border-line flex flex-col shadow-lg flex-1 overflow-hidden h-full">
                            <div class="flex items-center justify-between px-4 py-3 border-b border-line bg-panel2">
                                <div class="flex items-center gap-2">
                                    <div class="flex gap-1.5">
                                        <div class="w-3 h-3 rounded-full bg-red-500/80"></div>
                                        <div class="w-3 h-3 rounded-full bg-yellow-500/80"></div>
                                        <div class="w-3 h-3 rounded-full bg-green-500/80"></div>
                                    </div>
                                    <span class="ml-2 text-sm font-semibold text-muted">Paste text</span>
                                </div>
                                <div class="flex items-center gap-3">
                                    <span id="char-count" class="text-xs text-muted/80 font-mono">0 chars</span>
                                    <div class="w-px h-4 bg-softline"></div>
                                    <button id="btn-copy-editor" class="text-xs text-muted hover:text-white transition-colors flex items-center gap-1" title="Copy All">
                                        Copy All
                                    </button>
                                    <button id="btn-clear-editor" class="text-xs text-muted hover:text-red-400 transition-colors flex items-center gap-1" title="Clear Editor">
                                        Clear Editor
                                    </button>
                                </div>
                            </div>

                            <textarea id="paste-content" class="w-full flex-1 min-h-[360px] lg:min-h-[560px] resize-y bg-dark text-white p-4 md:p-5 font-mono text-sm leading-relaxed outline-none placeholder:text-muted/30 focus:bg-[#151515] transition-colors" placeholder="Write or paste your code here..." spellcheck="false"></textarea>

                            <div class="px-4 py-2 border-t border-line bg-panel2 flex justify-center text-xs text-muted/70">
                                Drop one file here or click to upload to Uploadery
                            </div>
                        </div>
                    </main>
                </div>
            `;

            renderLayout(html);

            // Bind Events
            const contentEl = document.getElementById('paste-content');
            const charCountEl = document.getElementById('char-count');
            const submitBtn = document.getElementById('btn-submit');
            const btnTemplate = document.getElementById('btn-save-template');

            contentEl.addEventListener('input', () => {
                charCountEl.textContent = `${contentEl.value.length} chars`;
            });

            document.getElementById('btn-clear-editor').addEventListener('click', () => {
                contentEl.value = "";
                charCountEl.textContent = `0 chars`;
                contentEl.focus();
            });

            document.getElementById('btn-copy-editor').addEventListener('click', () => {
                if (!contentEl.value) {
                    showToast("Editor kosong", "info");
                    return;
                }
                copyText(contentEl.value).then(() => showToast("Teks disalin ke clipboard"));
            });

            btnTemplate.addEventListener('click', () => {
                showToast("Fitur template belum tersedia", "info");
            });

            const submitHTML = submitBtn.innerHTML;
            const handleSubmit = () => createPaste(submitHTML);

            submitBtn.addEventListener('click', handleSubmit);

            // Hotkey Ctrl + Enter
            contentEl.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    handleSubmit();
                }
            });

            contentEl.focus();
        }

        async function createPaste(originalBtnText) {
            const titleEl = document.getElementById('paste-title');
            const syntaxEl = document.getElementById('paste-syntax');
            const visibilityEl = document.getElementById('paste-visibility');
            const expirationEl = document.getElementById('paste-expiration');
            const contentEl = document.getElementById('paste-content');
            const submitBtn = document.getElementById('btn-submit');

            const content = contentEl.value.trim();
            if (!content) {
                showToast("Paste text tidak boleh kosong", "error");
                contentEl.focus();
                return;
            }

            const payload = {
                title: titleEl.value.trim() || "Untitled Paste",
                content: content,
                syntax: syntaxEl.value,
                visibility: visibilityEl.value,
                expiration: expirationEl.value
            };

            setLoading(submitBtn, true, originalBtnText);

            try {
                const res = await fetch(`${API_BASE_URL}/api/pastes`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await res.json();

                if (res.ok && result.success) {
                    contentEl.value = "";
                    document.getElementById('char-count').textContent = "0 chars";
                    showSuccessModal(result.data);
                } else {
                    throw new Error(result.message || "Gagal membuat paste");
                }
            } catch (error) {
                showToast(error.message, "error");
            } finally {
                setLoading(submitBtn, false, originalBtnText);
            }
        }

        // ==========================================
        // HALAMAN: PASTE ARCHIVE
        // ==========================================
        let archiveDataCache = [];

        async function renderArchive(page = 1) {
            const html = `
                <main class="max-w-screen-xl mx-auto w-full p-4 md:p-6 lg:p-10 min-h-[calc(100vh-73px)] flex flex-col">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                        <div>
                            <h1 class="text-2xl md:text-3xl font-bold text-white tracking-tight mb-1">Paste Archive</h1>
                            <p class="text-sm text-muted">Kumpulan paste publik terbaru dari komunitas.</p>
                        </div>
                        <div class="relative w-full md:w-64">
                            <input type="text" id="archive-search" placeholder="Cari judul..." class="w-full bg-panel border border-line focus:border-neon focus:ring-1 focus:ring-neon rounded-lg pl-10 pr-4 py-2.5 text-sm text-white outline-none transition-all">
                            <svg class="w-4 h-4 text-muted absolute left-3.5 top-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </div>
                    </div>

                    <div id="archive-list" class="flex-1 flex flex-col gap-3 min-w-0">
                        <!-- Skeleton Loaders -->
                        ${Array(5).fill(0).map(() => `
                            <div class="bg-panel border border-line rounded-xl p-4 md:p-5 flex flex-col md:flex-row md:items-center gap-4 animate-pulse">
                                <div class="flex-1 space-y-3">
                                    <div class="h-5 bg-line rounded w-1/3"></div>
                                    <div class="flex gap-2">
                                        <div class="h-4 bg-line rounded w-16"></div>
                                        <div class="h-4 bg-line rounded w-24"></div>
                                    </div>
                                </div>
                                <div class="h-10 bg-line rounded w-full md:w-24"></div>
                            </div>
                        `).join('')}
                    </div>

                    <div id="archive-pagination" class="mt-8 flex items-center justify-center gap-4 hidden">
                        <button id="btn-prev" class="bg-panel hover:bg-line border border-line text-white font-medium py-2 px-4 rounded-lg transition-colors text-sm disabled:opacity-50 disabled:cursor-not-allowed">Previous</button>
                        <span id="page-info" class="text-sm font-medium text-muted">Page 1 of 1</span>
                        <button id="btn-next" class="bg-panel hover:bg-line border border-line text-white font-medium py-2 px-4 rounded-lg transition-colors text-sm disabled:opacity-50 disabled:cursor-not-allowed">Next</button>
                    </div>
                </main>
            `;

            renderLayout(html);
            await fetchArchive(page);
        }

        async function fetchArchive(page) {
            const listEl = document.getElementById('archive-list');
            const paginationEl = document.getElementById('archive-pagination');
            const searchInput = document.getElementById('archive-search');
            
            try {
                const res = await fetch(`${API_BASE_URL}/api/pastes?page=${page}&limit=50`);
                const result = await res.json();

                if (res.ok && result.success) {
                    const data = result.data;
                    const pagination = result.pagination;
                    archiveDataCache = data; 
                    
                    renderArchiveList(data);

                    searchInput.addEventListener('input', (e) => {
                        const query = e.target.value.toLowerCase();
                        const filtered = archiveDataCache.filter(item => 
                            (item.title || "Untitled Paste").toLowerCase().includes(query)
                        );
                        renderArchiveList(filtered, query !== "");
                    });

                    // Pagination Control
                    if (pagination && pagination.total_pages > 1) {
                        paginationEl.classList.remove('hidden');
                        
                        const btnPrev = document.getElementById('btn-prev');
                        const btnNext = document.getElementById('btn-next');
                        const pageInfo = document.getElementById('page-info');

                        pageInfo.textContent = `Page ${pagination.page} of ${pagination.total_pages}`;
                        
                        btnPrev.disabled = pagination.page <= 1;
                        btnNext.disabled = pagination.page >= pagination.total_pages;

                        const newBtnPrev = btnPrev.cloneNode(true);
                        const newBtnNext = btnNext.cloneNode(true);
                        btnPrev.replaceWith(newBtnPrev);
                        btnNext.replaceWith(newBtnNext);

                        newBtnPrev.addEventListener('click', () => { window.scrollTo(0,0); renderArchive(pagination.page - 1); });
                        newBtnNext.addEventListener('click', () => { window.scrollTo(0,0); renderArchive(pagination.page + 1); });
                    } else {
                        paginationEl.classList.add('hidden');
                    }
                } else {
                    throw new Error(result.message || "Gagal mengambil data");
                }
            } catch (error) {
                listEl.innerHTML = `
                    <div class="bg-panel border border-red-500/30 rounded-xl p-8 text-center">
                        <p class="text-sm text-muted">${error.message}</p>
                        <button onclick="renderArchive(1)" class="mt-4 bg-line hover:bg-softline text-white font-medium py-2 px-6 rounded-lg text-sm">Coba Lagi</button>
                    </div>
                `;
            }
        }

        function renderArchiveList(data, isSearching = false) {
            const listEl = document.getElementById('archive-list');
            
            if (!data || data.length === 0) {
                listEl.innerHTML = `
                    <div class="bg-panel border border-line rounded-xl p-10 text-center flex flex-col items-center justify-center">
                        <h3 class="text-lg font-bold text-white mb-1">Belum ada paste public</h3>
                        <p class="text-sm text-muted">Kosong.</p>
                    </div>
                `;
                return;
            }

            listEl.innerHTML = data.map(paste => `
                <div class="bg-panel hover:bg-panel2 border border-line rounded-xl p-4 md:p-5 flex flex-col md:flex-row md:items-center justify-between gap-4 transition-colors group min-w-0">
                    <div class="flex-1 min-w-0">
                        <h3 class="text-base font-bold text-white mb-2 truncate group-hover:text-neon transition-colors">
                            ${escapeHtml(paste.title || 'Untitled Paste')}
                        </h3>
                        <div class="flex flex-wrap items-center gap-3 text-xs text-muted">
                            <span class="inline-flex items-center gap-1 bg-line px-2 py-1 rounded text-white/90">
                                ${escapeHtml(paste.syntax || 'text')}
                            </span>
                            <span class="flex items-center gap-1" title="Views">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                                ${paste.views || 0}
                            </span>
                            <span class="flex items-center gap-1" title="Created At">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                ${formatDate(paste.created_at)}
                            </span>
                        </div>
                    </div>
                    <a href="/p/${paste.slug}" onclick="event.preventDefault(); navigateTo('/p/${paste.slug}')" class="w-full md:w-auto bg-line hover:bg-softline text-white font-medium py-2 px-5 rounded-lg transition-colors text-sm text-center shrink-0">
                        View
                    </a>
                </div>
            `).join('');
        }

        // ==========================================
        // HALAMAN: PASTE DETAIL
        // ==========================================
        async function renderPasteDetail(slug) {
            const html = `
                <main class="max-w-screen-xl mx-auto w-full p-4 md:p-6 lg:p-10 min-h-[calc(100vh-73px)] flex flex-col gap-6">
                    <div id="detail-header" class="flex flex-col md:flex-row md:items-start justify-between gap-4 animate-pulse">
                        <div class="space-y-3 flex-1">
                            <div class="h-8 bg-panel border border-line rounded w-3/4 md:w-1/2"></div>
                            <div class="h-5 bg-panel border border-line rounded w-full md:w-1/3"></div>
                        </div>
                    </div>
                    
                    <div id="detail-content" class="bg-panel border border-line rounded-xl overflow-hidden flex-1 animate-pulse min-h-[400px]">
                    </div>
                </main>
            `;
            
            renderLayout(html);
            await fetchPaste(slug);
        }

        async function fetchPaste(slug) {
            try {
                const res = await fetch(`${API_BASE_URL}/api/pastes/${slug}`);
                const result = await res.json();

                if (res.ok && result.success) {
                    renderPasteContent(result.data, slug);
                } else {
                    throw new Error(result.message || "Paste tidak ditemukan");
                }
            } catch (error) {
                const mainEl = document.querySelector('main');
                mainEl.innerHTML = `
                    <div class="flex-1 flex flex-col items-center justify-center text-center p-8 mt-10">
                        <h1 class="text-2xl font-bold text-white mb-2">Paste Tidak Ditemukan</h1>
                        <p class="text-muted mb-8">${error.message}</p>
                        <div class="flex flex-col sm:flex-row gap-4">
                            <button onclick="navigateTo('/')" class="bg-neon hover:bg-neon/90 text-dark font-bold py-2.5 px-6 rounded-lg text-sm">Buat Paste Baru</button>
                            <button onclick="navigateTo('/archive')" class="bg-panel hover:bg-line border border-line text-white font-medium py-2.5 px-6 rounded-lg text-sm">Lihat Archive</button>
                        </div>
                    </div>
                `;
            }
        }

        function renderPasteContent(paste, slug) {
            const mainEl = document.querySelector('main');
            const syntax = paste.syntax || 'text';
            const highlightClass = syntax === 'text' ? 'language-plaintext' : `language-${syntax}`;
            
            const rawUrl = paste.raw_url || `${API_BASE_URL}/api/raw/${slug}`;
            
            mainEl.innerHTML = `
                <div class="flex flex-col md:flex-row md:items-start justify-between gap-6 mb-2">
                    <div class="flex-1 min-w-0">
                        <h1 class="text-2xl md:text-3xl font-bold text-white tracking-tight mb-3 break-words leading-tight">
                            ${escapeHtml(paste.title || 'Untitled Paste')}
                        </h1>
                        
                        <div class="flex flex-wrap items-center gap-4 text-sm text-muted">
                            <span class="inline-flex items-center gap-1.5 bg-panel border border-line px-2.5 py-1.5 rounded-md text-white/90">
                                <span class="capitalize font-medium">${syntax}</span>
                            </span>
                            <span class="flex items-center gap-1.5">
                                ${paste.views || 0} Views
                            </span>
                            <span class="flex items-center gap-1.5">
                                ${formatDate(paste.created_at)}
                            </span>
                            <span class="flex items-center gap-1.5 capitalize">
                                ${paste.visibility}
                            </span>
                        </div>
                    </div>
                    
                    <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto shrink-0">
                        <button id="btn-copy-raw" class="bg-panel hover:bg-line border border-line text-white font-medium py-2.5 px-4 rounded-lg transition-colors text-sm">
                            Copy Raw
                        </button>
                        <button onclick="window.open('${rawUrl}', '_blank')" class="bg-panel hover:bg-line border border-line text-white font-medium py-2.5 px-4 rounded-lg transition-colors text-sm">
                            Open Raw
                        </button>
                        <button onclick="navigateTo('/')" class="bg-neon hover:bg-neon/90 text-dark font-bold py-2.5 px-4 rounded-lg transition-colors text-sm text-center">
                            New Paste
                        </button>
                    </div>
                </div>

                <!-- Code Area -->
                <div class="bg-[#0d1117] border border-line rounded-xl shadow-xl flex-1 flex flex-col min-w-0 mt-4 overflow-hidden">
                    <div class="flex items-center justify-between px-4 py-2.5 border-b border-line/50 bg-[#161b22]">
                        <div class="flex gap-1.5">
                            <div class="w-3 h-3 rounded-full bg-line"></div>
                            <div class="w-3 h-3 rounded-full bg-line"></div>
                            <div class="w-3 h-3 rounded-full bg-line"></div>
                        </div>
                    </div>
                    <div class="relative flex-1 overflow-x-auto">
                        <pre class="m-0 p-4 md:p-6 text-[13px] md:text-sm leading-relaxed"><code id="code-block" class="!bg-transparent ${highlightClass}"></code></pre>
                    </div>
                </div>
                
                <div class="mt-2 text-center flex flex-col sm:flex-row items-center justify-center gap-4">
                     <button onclick="navigateTo('/archive')" class="inline-flex items-center gap-2 text-sm text-muted hover:text-white transition-colors">
                        Back to Archive
                     </button>
                     <button onclick="navigateTo('/')" class="inline-flex items-center gap-2 text-sm text-muted hover:text-white transition-colors sm:hidden">
                        Back to New Paste
                     </button>
                </div>
            `;

            // MENCEGAH XSS: Masukkan content dengan .textContent bukan .innerHTML!
            const codeBlock = document.getElementById('code-block');
            codeBlock.textContent = paste.content || "";

            // Terapkan Highlight.js
            if (typeof hljs !== 'undefined') {
                try {
                    if (syntax !== 'text' && syntax !== 'plaintext') {
                       hljs.highlightElement(codeBlock);
                    }
                } catch (e) {
                    console.error("Highlight.js error:", e);
                }
            }

            document.getElementById('btn-copy-raw').addEventListener('click', () => {
                copyText(paste.content || "").then(() => showToast("Raw text disalin ke clipboard"));
            });
        }

        // ==========================================
        // INISIALISASI APLIKASI
        // ==========================================
        initApp();
    </script>
</body>
</html>
