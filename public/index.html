<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasteview - Share Text & Code Securely</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Highlight.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- Tailwind CSS Config -->
    <script>
        tailwind = {
            config: {
                theme: {
                    extend: {
                        colors: {
                            dark: "#111111",
                            panel: "#202020",
                            panel2: "#181818",
                            line: "#333333",
                            softline: "#444444",
                            neon: "#18e06f",
                            muted: "#a3a3a3"
                        },
                        fontFamily: {
                            inter: ["Inter", "sans-serif"]
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background-color: #111111;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #111111;
        }
        ::-webkit-scrollbar-thumb {
            background: #333333;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #444444;
        }

        /* Input Styles overrides */
        input[type="text"], input[type="password"], select, textarea {
            background-color: #181818;
            border: 1px solid #333333;
            color: white;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus, input[type="password"]:focus, select:focus, textarea:focus {
            border-color: #18e06f;
        }

        .loader {
            border: 3px solid #333333;
            border-top: 3px solid #18e06f;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .toast-enter {
            transform: translateY(100%);
            opacity: 0;
        }
        .toast-enter-active {
            transform: translateY(0);
            opacity: 1;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .toast-exit {
            transform: translateY(100%);
            opacity: 0;
            transition: all 0.3s ease-in;
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

    <!-- Global App Container -->
    <div id="app" class="flex flex-col min-h-screen"></div>

    <!-- Modal Root -->
    <div id="modal-root"></div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-4 left-1/2 -translate-x-1/2 md:left-auto md:-translate-x-0 md:right-4 z-50 flex flex-col gap-2"></div>

    <script>
        // === CONFIGURATION ===
        const API_BASE_URL = "https://paste.warungmezur.workers.dev";
        const FRONTEND_URL = "https://paste.warungmezur.web.id";

        // === GLOBAL STATE ===
        let serverTimeOffset = 0;
        let activeIntervals = {};
        window.__unlockedPaste = null;

        // === TIME & COUNTDOWN UTILS ===
        function syncServerTime(serverTime) {
            if (serverTime) {
                serverTimeOffset = Date.now() - serverTime;
            }
        }

        function getCurrentServerTime() {
            return Date.now() - serverTimeOffset;
        }

        function formatDate(timestamp) {
            if (!timestamp) return "-";
            const date = new Date(timestamp);
            return new Intl.DateTimeFormat('id-ID', {
                day: 'numeric',
                month: 'long',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            }).format(date).replace(' pukul', ',');
        }

        function formatDuration(ms) {
            if (ms <= 0) return "Expired";
            const totalSeconds = Math.floor(ms / 1000);
            const days = Math.floor(totalSeconds / 86400);
            const hours = Math.floor((totalSeconds % 86400) / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;

            if (days > 0) return `${days} hari ${hours} jam`;
            if (hours > 0) return `${hours} jam ${minutes} menit`;
            if (minutes > 0) return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            return `${seconds} detik`;
        }

        function startCountdown(elementId, expiresAt, onExpired = null) {
            if (!expiresAt) return;
            
            const element = document.getElementById(elementId);
            if (!element) return;

            const update = () => {
                const now = getCurrentServerTime();
                const diff = expiresAt - now;

                if (diff <= 0) {
                    element.textContent = "Expired";
                    clearInterval(activeIntervals[elementId]);
                    delete activeIntervals[elementId];
                    if (onExpired) onExpired();
                } else {
                    element.textContent = formatDuration(diff);
                }
            };

            update(); // initial call
            activeIntervals[elementId] = setInterval(update, 1000);
        }

        function clearAllCountdowns() {
            for (let id in activeIntervals) {
                clearInterval(activeIntervals[id]);
            }
            activeIntervals = {};
        }

        // === CORE UI UTILS ===
        function escapeHtml(text) {
            if (!text) return "";
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type = "success") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let bgClass = type === 'success' ? 'bg-neon text-dark' : (type === 'error' ? 'bg-red-500 text-white' : 'bg-panel text-white');
            
            toast.className = `toast-enter flex items-center px-4 py-3 rounded shadow-lg font-medium text-sm border border-line ${bgClass} min-w-[280px]`;
            toast.innerHTML = `
                <div class="flex-1">${escapeHtml(message)}</div>
                <button onclick="this.parentElement.remove()" class="ml-4 opacity-70 hover:opacity-100">&times;</button>
            `;
            
            container.appendChild(toast);
            
            // Animate in
            requestAnimationFrame(() => {
                toast.classList.remove('toast-enter');
                toast.classList.add('toast-enter-active');
            });

            // Auto close
            setTimeout(() => {
                toast.classList.remove('toast-enter-active');
                toast.classList.add('toast-exit');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function showModal(htmlContent) {
            const root = document.getElementById('modal-root');
            root.innerHTML = `
                <div class="fixed inset-0 z-[100] flex items-center justify-center p-4">
                    <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeModal()"></div>
                    <div class="relative bg-panel border border-line rounded-lg shadow-2xl w-full max-w-[92vw] md:max-w-md overflow-hidden transform transition-all">
                        ${htmlContent}
                    </div>
                </div>
            `;
            
            const handleEsc = (e) => {
                if(e.key === 'Escape') {
                    closeModal();
                    document.removeEventListener('keydown', handleEsc);
                }
            };
            document.addEventListener('keydown', handleEsc);
        }

        function closeModal() {
            document.getElementById('modal-root').innerHTML = '';
        }

        function copyText(text, buttonElement) {
            navigator.clipboard.writeText(text).then(() => {
                showToast("Berhasil disalin!", "success");
                if (buttonElement) {
                    const originalText = buttonElement.innerHTML;
                    buttonElement.innerHTML = `<svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Copied`;
                    setTimeout(() => {
                        buttonElement.innerHTML = originalText;
                    }, 2000);
                }
            }).catch(err => {
                showToast("Gagal menyalin text", "error");
            });
        }

        function setLoading(btnId, isLoading, originalText = "Submit") {
            const btn = document.getElementById(btnId);
            if (!btn) return;
            if (isLoading) {
                btn.disabled = true;
                btn.classList.add('opacity-70', 'cursor-not-allowed');
                btn.innerHTML = `<div class="flex items-center justify-center"><div class="loader mr-2 border-t-dark"></div> Saving...</div>`;
            } else {
                btn.disabled = false;
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
                btn.innerHTML = originalText;
            }
        }

        function togglePasswordVisibility(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />`;
            } else {
                input.type = "password";
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />`;
            }
        }

        // === ROUTING ===
        function navigateTo(path) {
            history.pushState(null, "", path);
            renderRoute();
        }

        window.addEventListener("popstate", renderRoute);

        function renderRoute() {
            clearAllCountdowns();
            const path = window.location.pathname;
            const app = document.getElementById('app');
            
            // Render basic layout header first
            app.innerHTML = renderHeader() + `<main id="main-content" class="flex-1 w-full max-w-7xl mx-auto"></main>`;
            const main = document.getElementById('main-content');

            if (path === "/" || path === "") {
                main.innerHTML = getNewPasteHTML();
                initNewPasteLogic();
            } else if (path === "/archive") {
                main.innerHTML = getArchiveHTML();
                fetchArchive(1);
            } else if (path.startsWith("/p/")) {
                const slug = path.split("/p/")[1];
                if(slug) {
                    renderPasteDetail(slug);
                } else {
                    renderNotFound(main);
                }
            } else {
                renderNotFound(main);
            }
        }

        function renderHeader() {
            const currentPath = window.location.pathname;
            const isHome = currentPath === '/';
            const isArchive = currentPath === '/archive';
            
            return `
                <header class="bg-panel border-b border-line sticky top-0 z-40">
                    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                        <a href="/" onclick="event.preventDefault(); navigateTo('/')" class="flex items-center gap-2 text-xl font-bold tracking-tight text-white hover:text-neon transition-colors">
                            <svg class="w-6 h-6 text-neon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                            Pasteview
                        </a>
                        <nav class="flex items-center gap-4 text-sm font-medium">
                            <a href="/" onclick="event.preventDefault(); navigateTo('/')" class="${isHome ? 'text-neon' : 'text-muted hover:text-white'} transition-colors hidden md:block">+ New Paste</a>
                            <a href="/archive" onclick="event.preventDefault(); navigateTo('/archive')" class="${isArchive ? 'text-neon' : 'text-muted hover:text-white'} transition-colors flex items-center gap-1.5">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path></svg>
                                Archive
                            </a>
                        </nav>
                    </div>
                </header>
            `;
        }

        // === VIEW: NEW PASTE ===
        function getNewPasteHTML() {
            return `
                <div class="grid grid-cols-1 lg:grid-cols-[330px_1fr] gap-0 lg:gap-6 p-0 lg:p-6 h-full">
                    
                    <!-- Sidebar Form -->
                    <div class="bg-panel lg:rounded-xl border-b lg:border border-line p-5 space-y-5 h-fit order-2 lg:order-1 mt-6 lg:mt-0 mb-8 lg:mb-0">
                        <div class="mb-2 hidden lg:block">
                            <h2 class="text-lg font-bold text-white">Create New Paste</h2>
                            <p class="text-xs text-muted mt-1">Configure your paste settings.</p>
                        </div>
                        
                        <div class="space-y-4">
                            <div>
                                <label class="block text-xs font-semibold text-muted mb-1.5 uppercase tracking-wider">Title</label>
                                <input type="text" id="p-title" placeholder="Untitled Paste" class="w-full px-3 py-2.5 rounded text-sm placeholder-softline focus:ring-1 focus:ring-neon">
                            </div>

                            <div>
                                <label class="block text-xs font-semibold text-muted mb-1.5 uppercase tracking-wider">Syntax Highlighting</label>
                                <select id="p-syntax" class="w-full px-3 py-2.5 rounded text-sm appearance-none cursor-pointer">
                                    <option value="text">Plain Text</option>
                                    <option value="javascript">JavaScript</option>
                                    <option value="html">HTML</option>
                                    <option value="css">CSS</option>
                                    <option value="json">JSON</option>
                                    <option value="php">PHP</option>
                                    <option value="sql">SQL</option>
                                    <option value="java">Java</option>
                                    <option value="python">Python</option>
                                    <option value="markdown">Markdown</option>
                                    <option value="bash">Bash</option>
                                    <option value="typescript">TypeScript</option>
                                    <option value="xml">XML</option>
                                    <option value="cpp">C++</option>
                                    <option value="go">Go</option>
                                    <option value="rust">Rust</option>
                                    <option value="ruby">Ruby</option>
                                </select>
                            </div>

                            <div>
                                <label class="block text-xs font-semibold text-muted mb-1.5 uppercase tracking-wider">Visibility</label>
                                <select id="p-visibility" class="w-full px-3 py-2.5 rounded text-sm appearance-none cursor-pointer">
                                    <option value="public">Public</option>
                                    <option value="unlisted">Unlisted</option>
                                    <option value="private">Private (Password)</option>
                                </select>
                            </div>

                            <div id="password-wrapper" class="hidden">
                                <label class="block text-xs font-semibold text-muted mb-1.5 uppercase tracking-wider">Password Private Paste</label>
                                <div class="relative">
                                    <input type="password" id="p-password" placeholder="Masukkan password min 4 kar" class="w-full px-3 py-2.5 rounded text-sm pr-10">
                                    <button type="button" onclick="togglePasswordVisibility('p-password', 'eye-icon-new')" class="absolute inset-y-0 right-0 flex items-center pr-3 text-muted hover:text-white">
                                        <svg id="eye-icon-new" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                                    </button>
                                </div>
                            </div>

                            <div>
                                <label class="block text-xs font-semibold text-muted mb-1.5 uppercase tracking-wider">Expiration</label>
                                <select id="p-expiration" class="w-full px-3 py-2.5 rounded text-sm appearance-none cursor-pointer">
                                    <option value="never">No Expiration</option>
                                    <option value="5m">5 Minutes</option>
                                    <option value="10m">10 Minutes</option>
                                    <option value="30m">30 Minutes</option>
                                    <option value="1h">1 Hour</option>
                                    <option value="6h">6 Hours</option>
                                    <option value="12h">12 Hours</option>
                                    <option value="1d">1 Day</option>
                                    <option value="3d">3 Days</option>
                                    <option value="7d">7 Days</option>
                                    <option value="30d">30 Days</option>
                                </select>
                            </div>
                        </div>

                        <button id="btn-submit-paste" class="w-full bg-neon text-dark font-bold py-3 rounded hover:bg-[#15c561] transition-colors mt-6 shadow-[0_0_15px_rgba(24,224,111,0.2)]">
                            Create Paste
                        </button>
                    </div>

                    <!-- Editor Area -->
                    <div class="flex flex-col h-full order-1 lg:order-2 bg-[#141414] lg:bg-transparent">
                        <div class="flex items-center justify-between p-3 lg:px-0 lg:py-2 border-b lg:border-none border-line">
                            <div class="text-sm font-medium text-muted">Editor</div>
                            <div class="flex items-center gap-3 text-xs">
                                <span id="char-count" class="text-muted">0 Chars</span>
                                <button onclick="document.getElementById('p-content').value=''; document.getElementById('char-count').textContent='0 Chars';" class="text-muted hover:text-white transition">Clear</button>
                            </div>
                        </div>
                        
                        <div class="flex-1 relative group rounded-none lg:rounded-xl overflow-hidden border-y lg:border border-line bg-panel2 focus-within:border-neon transition-colors">
                            <textarea id="p-content" class="w-full h-full min-h-[360px] lg:min-h-[560px] bg-transparent text-white p-4 font-mono text-sm resize-none focus:outline-none" placeholder="Paste your code or text here..." spellcheck="false"></textarea>
                        </div>
                        
                        <div class="p-3 text-center text-xs text-softline border-b lg:border-none border-line lg:mt-2">
                            Drop one file here or click to upload to Uploadery (UI Only)
                        </div>
                    </div>
                </div>
            `;
        }

        function initNewPasteLogic() {
            const visSelect = document.getElementById('p-visibility');
            const passWrapper = document.getElementById('password-wrapper');
            const passInput = document.getElementById('p-password');
            const contentArea = document.getElementById('p-content');
            const charCount = document.getElementById('char-count');
            const btnSubmit = document.getElementById('btn-submit-paste');

            visSelect.addEventListener('change', (e) => {
                if(e.target.value === 'private') {
                    passWrapper.classList.remove('hidden');
                } else {
                    passWrapper.classList.add('hidden');
                    passInput.value = '';
                }
            });

            contentArea.addEventListener('input', (e) => {
                charCount.textContent = `${e.target.value.length} Chars`;
            });

            btnSubmit.addEventListener('click', async () => {
                const title = document.getElementById('p-title').value.trim();
                const syntax = document.getElementById('p-syntax').value;
                const visibility = document.getElementById('p-visibility').value;
                const expiration = document.getElementById('p-expiration').value;
                const content = document.getElementById('p-content').value;
                const password = document.getElementById('p-password').value;

                if (!content) {
                    return showToast("Content paste tidak boleh kosong!", "error");
                }
                if (visibility === 'private' && password.length < 4) {
                    return showToast("Password private minimal 4 karakter!", "error");
                }

                setLoading('btn-submit-paste', true, "Create Paste");

                const payload = { title, syntax, visibility, expiration, content };
                if (visibility === 'private') {
                    payload.password = password;
                }

                try {
                    const res = await fetch(`${API_BASE_URL}/api/pastes`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await res.json();

                    if (data.success) {
                        syncServerTime(data.server_time);
                        showSuccessModal(data.data);
                    } else {
                        showToast(data.message || "Gagal membuat paste", "error");
                    }
                } catch (error) {
                    showToast("Terjadi kesalahan jaringan", "error");
                } finally {
                    setLoading('btn-submit-paste', false, "Create Paste");
                }
            });
        }

        function showSuccessModal(pasteData) {
            const url = pasteData.frontend_url || `${FRONTEND_URL}/p/${pasteData.slug}`;
            
            let warningHtml = '';
            if (pasteData.visibility === 'private') {
                warningHtml = `
                    <div class="bg-yellow-500/10 border border-yellow-500/30 text-yellow-500 text-sm p-3 rounded mb-4 flex gap-2 items-start">
                        <svg class="w-5 h-5 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        <p>Paste ini private. Simpan password kamu, karena dibutuhkan untuk membuka paste.</p>
                    </div>
                `;
            }

            let expireHtml = '';
            if (pasteData.expires_at) {
                expireHtml = `
                    <div class="text-sm text-muted mb-4 text-center">
                        Paste akan expired dalam: <span id="modal-countdown-${pasteData.slug}" class="text-neon font-mono font-medium">--:--</span>
                    </div>
                `;
            }

            showModal(`
                <div class="p-6">
                    <div class="w-12 h-12 rounded-full bg-neon/10 text-neon flex items-center justify-center mx-auto mb-4">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                    <h3 class="text-xl font-bold text-center text-white mb-2">Paste Created!</h3>
                    <p class="text-center text-sm text-muted mb-6">Your paste has been successfully saved.</p>
                    
                    ${warningHtml}
                    ${expireHtml}

                    <div class="flex items-center gap-2 mb-6">
                        <input type="text" readonly value="${url}" class="flex-1 bg-panel2 border border-line text-muted text-sm px-3 py-2.5 rounded focus:outline-none">
                        <button onclick="copyText('${url}', this)" class="bg-line hover:bg-softline text-white px-4 py-2.5 rounded text-sm font-medium transition flex items-center">
                            Copy
                        </button>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="closeModal(); document.getElementById('p-content').value=''; document.getElementById('p-title').value='';" class="px-4 py-2.5 rounded text-sm font-medium border border-line text-white hover:bg-panel2 transition">
                            Create Another
                        </button>
                        <button onclick="closeModal(); navigateTo('/p/${pasteData.slug}')" class="px-4 py-2.5 rounded text-sm font-medium bg-neon text-dark hover:bg-[#15c561] transition">
                            Open Paste
                        </button>
                    </div>
                </div>
            `);

            if (pasteData.expires_at) {
                startCountdown(`modal-countdown-${pasteData.slug}`, pasteData.expires_at);
            }
        }

        // === VIEW: ARCHIVE ===
        function getArchiveHTML() {
            return `
                <div class="p-4 lg:p-8">

        async function fetchArchive(page = 1) {
            const listEl = document.getElementById('archive-list');
            if(!listEl) return;

            try {
                const res = await fetch(`${API_BASE_URL}/api/pastes?page=${page}&limit=50`);
                const data = await res.json();

                if (data.success) {
                    syncServerTime(data.server_time);
                    renderArchiveCards(data.data);
                } else {
                    listEl.innerHTML = `<div class="col-span-full text-center text-red-400 py-8">${escapeHtml(data.message)}</div>`;
                }
            } catch (error) {
                listEl.innerHTML = `<div class="col-span-full text-center text-red-400 py-8">Failed to load archive.</div>`;
            }
        }

        function renderArchiveCards(pastes) {
            const listEl = document.getElementById('archive-list');
            if (!pastes || pastes.length === 0) {
                listEl.innerHTML = `
                    <div class="col-span-full flex flex-col items-center justify-center py-16 text-center border border-dashed border-line rounded-xl">
                        <div class="w-16 h-16 rounded-full bg-panel flex items-center justify-center text-muted mb-4">

                        <h3 class="text-lg font-medium text-white mb-1">No pastes found</h3>
                        <p class="text-muted text-sm">The archive is currently empty.</p>
                    </div>`;
                return;
            }

            listEl.innerHTML = '';
            
            pastes.forEach(paste => {
                const isPrivate = paste.visibility === 'private' || paste.is_private;
                const isExpired = paste.expires_at && (paste.expires_at - getCurrentServerTime() <= 0);
                
                const card = document.createElement('div');
                card.className = "bg-panel border border-line rounded-xl p-5 hover:border-softline transition-colors flex flex-col h-full relative overflow-hidden group";
                
                let visibilityBadge = isPrivate ? 
                    `<span class="bg-red-500/10 text-red-400 border border-red-500/20 text-[10px] uppercase tracking-wider px-2 py-0.5 rounded font-bold flex items-center gap-1"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg> Private</span>` : 
                    `<span class="bg-neon/10 text-neon border border-neon/20 text-[10px] uppercase tracking-wider px-2 py-0.5 rounded font-bold">Public</span>`;

                let timeInfo = '';
                if (paste.expires_at) {
                    timeInfo = `<div class="mt-4 pt-3 border-t border-line text-xs flex justify-between items-center text-muted">
                        <span>Expires in:</span>
                        <span id="card-timer-${paste.slug}" class="font-mono ${isExpired ? 'text-red-400' : 'text-neon'}">Loading...</span>
                    </div>`;
                }

                let actionButton = '';
                if (isExpired) {
                     actionButton = `<button disabled class="w-full mt-4 py-2 bg-line text-muted rounded text-sm font-medium cursor-not-allowed">Expired</button>`;
                } else if (isPrivate) {
                     actionButton = `<button onclick='openArchivePrivateModal(${JSON.stringify(paste).replace(/'/g, "&apos;")})' class="w-full mt-4 py-2 bg-panel2 border border-line hover:bg-line text-white rounded text-sm font-medium transition flex items-center justify-center gap-2"><svg class="w-4 h-4 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg> Unlock Paste</button>`;
                } else {
                     actionButton = `<button onclick="navigateTo('/p/${paste.slug}')" class="w-full mt-4 py-2 bg-neon/10 text-neon hover:bg-neon hover:text-dark rounded text-sm font-medium transition">View Paste</button>`;
                }

                card.innerHTML = `
                    <div class="flex-1">
                        <div class="flex justify-between items-start mb-3">
                            <h3 class="font-bold text-white text-lg truncate pr-3" title="${escapeHtml(paste.title || 'Untitled')}">${escapeHtml(paste.title || 'Untitled')}</h3>
                            ${visibilityBadge}
                        </div>
                        <div class="flex items-center gap-3 text-xs text-muted mb-4">
                            <span class="bg-panel2 px-2 py-1 rounded text-[11px] font-mono border border-line uppercase">${paste.syntax || 'text'}</span>
                            <span class="flex items-center gap-1"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg> ${paste.views || 0}</span>

                listEl.appendChild(card);

                if (paste.expires_at) {
                    startCountdown(`card-timer-${paste.slug}`, paste.expires_at, () => fetchArchive(page));

        }

        function openArchivePrivateModal(paste) {
            showModal(`

                            </button>
                        </div>

                    <div class="flex gap-3">
                        <button onclick="closeModal()" class="flex-1 px-4 py-2.5 rounded text-sm font-medium border border-line text-white hover:bg-panel2 transition">Cancel</button>
                        <button id="btn-modal-unlock" onclick="verifyArchiveUnlock('${paste.slug}')" class="flex-1 px-4 py-2.5 rounded text-sm font-medium bg-neon text-dark hover:bg-[#15c561] transition">Unlock</button>
                    </div>
                </div>
            `);
            setTimeout(() => document.getElementById('modal-unlock-password').focus(), 100);
        }

        async function verifyArchiveUnlock(slug) {
            const pwdInput = document.getElementById('modal-unlock-password');
            const password = pwdInput.value;
            if(!password) return showToast("Password wajib diisi!", "error");

            setLoading('btn-modal-unlock', true, "Unlock");
            try {
                const res = await fetch(`${API_BASE_URL}/api/pastes/${slug}/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await res.json();
                
                if (data.success) {
                    window.__unlockedPaste = data.data; // Simpan data untuk dirender di halaman detail
                    closeModal();
                    navigateTo(`/p/${slug}`);
                } else {
                    showToast(data.message || "Password salah", "error");
                    pwdInput.value = '';
                    pwdInput.focus();
                }
            } catch(e) {
                showToast("Terjadi kesalahan jaringan", "error");
            } finally {
                setLoading('btn-modal-unlock', false, "Unlock");
            }
        }


        // === VIEW: PASTE DETAIL ===
        async function renderPasteDetail(slug) {
            const main = document.getElementById('main-content');
            main.innerHTML = `<div class="flex justify-center py-20"><div class="loader w-10 h-10 border-4 border-t-neon"></div></div>`;

            // Cek apakah sudah di-unlock dari archive
            if (window.__unlockedPaste && window.__unlockedPaste.slug === slug) {
                const pasteData = window.__unlockedPaste;
                window.__unlockedPaste = null; // consume
                renderPasteContent(pasteData, main);
                return;
            }

            try {
                const res = await fetch(`${API_BASE_URL}/api/pastes/${slug}`);
                const data = await res.json();
                
                syncServerTime(data.server_time);

                if (data.success) {
                    renderPasteContent(data.data, main);
                } else if (data.private) {
                    renderPrivateUnlock(data.data, slug, main);
                } else if (data.expired) {
                    renderExpiredPage(main);
                } else {
                    renderNotFound(main);
                }
            } catch(e) {
                main.innerHTML = `<div class="text-center py-20 text-red-400">Failed to load paste. Check connection.</div>`;
            }
        }

        function renderPasteContent(paste, container) {

                renderExpiredPage(container);
                return;

            const isPrivate = paste.visibility === 'private';
            let visibilityBadge = isPrivate ?

                    `<span class="bg-neon/10 text-neon border border-neon/20 text-[10px] uppercase tracking-wider px-2 py-0.5 rounded font-bold flex items-center gap-1"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> ${paste.visibility}</span>`;

            container.innerHTML = `

                                    <span class="uppercase">${paste.syntax}</span>
                                </span>
                                <span class="flex items-center gap-1.5">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                                    ${paste.views} views
                                </span>

        function renderPrivateUnlock(meta, slug, container) {
            container.innerHTML = `

        async function verifyPageUnlock(slug) {
            const pwdInput = document.getElementById('page-unlock-password');
            const password = pwdInput.value;
            if(!password) return showToast("Password wajib diisi!", "error");

            setLoading('btn-page-unlock', true, "Unlock Paste");
            try {
                const res = await fetch(`${API_BASE_URL}/api/pastes/${slug}/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await res.json();
                
                if (data.success) {
                    const main = document.getElementById('main-content');
                    renderPasteContent(data.data, main);
                } else {
                    showToast(data.message || "Password salah", "error");
                    pwdInput.value = '';
                    pwdInput.focus();
                }
            } catch(e) {
                showToast("Terjadi kesalahan jaringan", "error");
            } finally {
                setLoading('btn-page-unlock', false, "Unlock Paste");
            }
        }

        function renderExpiredPage(container) {
            container.innerHTML = `

                </div>
            `;
        }

        // === INITIALIZE ===
        function initApp() {
            // First time sync server time (approximate, gets refined on fetch)
            syncServerTime(Date.now());
            renderRoute();
        }

        // Start the app
        document.addEventListener('DOMContentLoaded', initApp);
